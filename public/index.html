let triageSelectedIds = new Set();

function toggleTriageItem(id, checked) {
  if (checked) triageSelectedIds.add(id);
  else triageSelectedIds.delete(id);

  const count = triageSelectedIds.size;
  const bar = document.getElementById('triage-batch-bar');
  const countEl = document.getElementById('triage-count');
  if (bar) bar.style.display = count > 0 ? 'block' : 'none';
  if (countEl) countEl.textContent = count;
}

async function startBatchTriage() {
  if (triageSelectedIds.size === 0) return;
  const itemIds = [...triageSelectedIds];
  showTriageLoadingState();

  try {
    const res = await fetch('/api/inbox/triage-batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ itemIds }),
    });
    if (!res.ok) throw new Error('Triage failed');
    const data = await res.json();
    const { clusters, questions } = data.data;
    hideTriageLoadingState();
    if (questions && questions.length > 0) {
      renderTriageQuestions(questions, clusters, itemIds);
    } else {
      renderTriagePreview(clusters, itemIds);
    }
  } catch (err) {
    hideTriageLoadingState();
    showToast('Triage failed — try again', 'warning');
  }
}

function showTriageLoadingState() {
  const btn = document.getElementById('start-batch-triage-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Thinking…'; }
}

function hideTriageLoadingState() {
  const btn = document.getElementById('start-batch-triage-btn');
  if (btn) { btn.disabled = false; btn.textContent = `Triage Selected (${triageSelectedIds.size}) →`; }
}

function renderTriageQuestions(questions, pendingClusters, itemIds) {
  const container = document.getElementById('centerContent');
  if (!container) return;

  const inputs = questions.map((q, i) => `
    <div style="margin-bottom:12px;">
      <div style="font-size:11px;color:#6b7280;margin-bottom:4px;">${escHtml(q.question || q)}</div>

async function submitTriageQuestions() {
  const questions = window._triagePendingQuestions || [];
  const clusters  = window._triagePendingClusters || [];
  const itemIds   = window._triagePendingItemIds || [];

  const saves = questions.map((q, i) => {
    const answer = document.getElementById(`triage-q-${i}`)?.value.trim();
    if (!answer) return Promise.resolve();
    return fetch('/api/context', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        key: (q.context_key || (q.question || q).slice(0, 60)),
        value: answer,
        category: 'task_duration',
        source: 'inbox_triage',
      }),
    });
  });

  await Promise.all(saves).catch(() => {});

  window._triagePendingQuestions = null;
  window._triagePendingClusters  = null;
  window._triagePendingItemIds   = null;

  renderTriagePreview(clusters, itemIds);
}

function removeTriageCluster(ci) {
  const el = document.getElementById(`triage-cluster-${ci}`);
  if (el) el.remove();
}

function removeTriageAction(ci, ai) {
  const titleEl = document.getElementById(`triage-action-title-${ci}-${ai}`);
  if (titleEl) titleEl.closest('div[style]')?.remove();
}

function toggleTriageEnergy(ci, ai) {
  const btn = document.getElementById(`triage-energy-${ci}-${ai}`);
  if (!btn) return;
  const current = btn.textContent.trim();
  btn.textContent = current === 'deep' ? 'light' : 'deep';
}

async function confirmBatchTriage() {
  const clusterEls = document.querySelectorAll('[id^="triage-cluster-"]');
  const errors = [];

  for (let ci = 0; ci < clusterEls.length; ci++) {
    const el = clusterEls[ci];
    if (!el || el.style.display === 'none') continue;

    const titleEl = document.getElementById(`triage-outcome-title-${ci}`);
    const projEl  = document.getElementById(`triage-project-${ci}`);
    const title   = titleEl?.value.trim();
    const projectId = projEl?.value;

    if (!title || !projectId) {
      errors.push(`Outcome ${ci + 1}: select a project and provide a title`);
      continue;
    }

    try {
      const outcomeRes = await fetch('/api/outcomes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, project_id: parseInt(projectId) }),
      });
      if (!outcomeRes.ok) throw new Error('outcome creation failed');
      const outcomeData = await outcomeRes.json();
      const outcomeId = outcomeData.data?.id;

      let ai = 0;
      while (document.getElementById(`triage-action-title-${ci}-${ai}`)) {
        const actionTitle = document.getElementById(`triage-action-title-${ci}-${ai}`)?.value.trim();
        const timeEstimate = parseInt(document.getElementById(`triage-action-time-${ci}-${ai}`)?.value) || null;
        const energyType = document.getElementById(`triage-energy-${ci}-${ai}`)?.textContent.trim() || 'deep';

        if (actionTitle && outcomeId) {
          await fetch(`/api/outcomes/${outcomeId}/actions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: actionTitle,
              time_estimate: timeEstimate,
              energy_type: energyType,
            }),
          });
        }
        ai++;
      }
    } catch (e) {
      errors.push(`Outcome ${ci + 1}: ${e.message}`);
    }
  }

  const itemIds = window._triageItemIds || [];
  await Promise.all(itemIds.map(id =>
    fetch(`/api/inbox/${id}/dismiss`, { method: 'POST' }).catch(() => {})
  ));

  if (errors.length > 0) {
    showToast(`Some items failed: ${errors[0]}`, 'warning');
  } else {
    showToast('Triage complete — outcomes and actions created', 'success');
  }

  triageSelectedIds = new Set();
  window._triageClusters = null;
  window._triageItemIds  = null;
  await Promise.all([loadData(), loadInboxData()]);
  renderAll();
  updateInboxBadge();
}

function cancelBatchTriage() {
  triageSelectedIds = new Set();
  window._triageClusters = null;
  window._triageItemIds  = null;
  renderCenter();
}

let soundEnabled = localStorage.getItem('waypoint_sound_enabled') === 'true';

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('waypoint_sound_enabled', String(soundEnabled));
  const btn = document.getElementById('sound-toggle-btn');
  if (btn) btn.textContent = soundEnabled ? 'On' : 'Off';
}

function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'check') {
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.1);
    } else if (type === 'complete') {
      osc.frequency.value = 660;
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'archive') {
      osc.type = 'sine';
      osc.frequency.value = 523;
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    }
  } catch (_) {}
}

function formatWeekOf(weekOf) {
  // Returns "Feb 17–21" — Monday to Friday of that week
  if (!weekOf) return '';
  const monday = new Date(weekOf + 'T00:00:00');
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  const monStr = monday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); // "Feb 17"
  const friDay = friday.toLocaleDateString('en-US', { day: 'numeric' }); // "21"
  return `${monStr}\u2013${friDay}`; // "Feb 17–21" using en dash
}

function formatAdvisorDate(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch (_) {
    return '';
  }
}

let _journalFilter = 'all';

let _journalCurrentId = null;

function _todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function _fmtJournalDate(iso) {
  if (!iso) return '';
  const t = _todayISO();
  if (iso === t) return 'Today';
  const y = new Date(new Date(t).getTime() - 86400000).toISOString().slice(0,10);
  if (iso === y) return 'Yesterday';
  try { return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
  catch(_) { return iso; }
}

function _fmtJournalWeekday(iso) {
  if (!iso) return '';
  try { return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short' }); }
  catch(_) { return ''; }
}

	      <div class="jv-filter-row">
        <button class="jv-pill active-all" id="jv-pill-all" onclick="_setJournalFilter('all')">All</button>
        <button class="jv-pill" id="jv-pill-standup" onclick="_setJournalFilter('standup')">Standup</button>
        <button class="jv-pill" id="jv-pill-review" onclick="_setJournalFilter('review')">Review</button>
        <button class="jv-pill" id="jv-pill-ai_work" onclick="_setJournalFilter('ai_work')">AI Work</button>
      </div>

      <!-- Carry-forward section (populated dynamically) -->
      <div id="jv-carry-forwards"></div>

      <!-- Type toggle for new entry -->
	      <div id="jv-type-toggle">
	        <div class="jv-type-toggle">
          <button class="jv-type-btn active" id="jv-typebtn-standup" onclick="_setJournalSaveType('standup')">Standup</button>
          <button class="jv-type-btn" id="jv-typebtn-review" onclick="_setJournalSaveType('review')">Review</button>
        </div>
      </div>

      <!-- Brain dump -->
	      <div class="jv-compose-card">
	        <div class="jv-prompt" id="jv-prompt">What are you working on today?</div>
	        <textarea id="jv-input" placeholder="Brain dump here -- what's on your mind, what you're focused on, blockers, wins..."
	          rows="5" class="jv-input"
	          oninput="_toggleJournalSave()"></textarea>
	        <div style="display:flex;align-items:center;gap:8px;margin-top:12px;">
	          <button class="jv-save-btn" id="jv-save-btn" onclick="_saveJournalEntry()" style="opacity:0.4;pointer-events:none;">Save</button>
        </div>
      </div>

      <!-- Timeline -->
      <div style="margin-top:24px;">
	        <div class="jv-section-label">Recent Entries</div>
        <div id="jv-timeline"></div>
      </div>
    </div>
  `;

  // Load timeline + carry-forwards
  await Promise.all([_loadJournalEntry(), _loadJournalTimeline(), _loadCarryForwards()]);
  _renderJournalRightPanel(right);
}

function _setJournalFilter(type) {
  _journalFilter = type;
  // Update pill active states
  ['all','standup','review','ai_work'].forEach(t => {
    const pill = document.getElementById('jv-pill-' + t);
    if (!pill) return;
    pill.className = 'jv-pill' + (t === type ? ' active-' + t : '');
  });
  // Update save type when a specific filter is chosen
  if (type === 'standup' || type === 'review') {
    _journalSaveType = type;
    _updateSaveTypeToggle();
  }
  // Update prompt based on current save type
  _updateJournalPrompt();
  // Reload
  _journalViewDate = _todayISO();
  _journalCurrentId = null;
  _loadJournalEntry();
  _loadJournalTimeline();
  _loadCarryForwards();
}

function _setJournalSaveType(type) {
  _journalSaveType = type;
  _updateSaveTypeToggle();
  _updateJournalPrompt();
  // Reload current entry for this type
  _journalViewDate = _todayISO();
  _journalCurrentId = null;
  _loadJournalEntry();
}

function _updateSaveTypeToggle() {
  const bs = document.getElementById('jv-typebtn-standup');
  const br = document.getElementById('jv-typebtn-review');
  if (bs) { bs.className = 'jv-type-btn' + (_journalSaveType === 'standup' ? ' active' : ''); }
  if (br) { br.className = 'jv-type-btn' + (_journalSaveType === 'review' ? ' active' : ''); }
}

function _updateJournalPrompt() {
  const prompt = document.getElementById('jv-prompt');
  const input = document.getElementById('jv-input');
  if (prompt) prompt.textContent = _journalSaveType === 'standup' ? 'What are you working on today?' : 'How did today go?';
  if (input) input.placeholder = _journalSaveType === 'standup'
    ? "Brain dump here -- what's on your mind, what you're focused on, blockers, wins..."
    : "Reflect on your day -- what went well, what didn't, energy levels, learnings...";
}

function _toggleJournalSave() {
  const input = document.getElementById('jv-input');
  const save = document.getElementById('jv-save-btn');
  const hasText = input && input.value.trim().length > 0;
  if (save) { save.style.opacity = hasText ? '1' : '0.4'; save.style.pointerEvents = hasText ? 'auto' : 'none'; }
}

async function _loadJournalEntry() {
  try {
    const res = await fetch(`/api/daily-entries?type=${_journalSaveType}&limit=10`);
    const json = await res.json();
    const list = json.data || [];
    const match = list.find(e => e.date === _journalViewDate);
    const input = document.getElementById('jv-input');
    if (match) {
      if (input) input.value = match.content || '';
      _journalCurrentId = match.id;
    } else {
      if (input) input.value = '';
      _journalCurrentId = null;
    }
    _toggleJournalSave();
  } catch(e) { console.error('Journal load error:', e); }
}

async function _loadJournalTimeline() {
  try {
    const res = await fetch('/api/daily-entries?limit=20');
    const json = await res.json();
    let list = json.data || [];
    // Client-side filter
    if (_journalFilter === 'standup') list = list.filter(e => e.type === 'standup');
    else if (_journalFilter === 'review') list = list.filter(e => e.type === 'review');
    else if (_journalFilter === 'ai_work') list = list.filter(e => e.type === 'ai_work');

    const container = document.getElementById('jv-timeline');
    if (!container) return;
    if (!list.length) {
      container.innerHTML = '<div style="color:#9ca3af;font-size:12px;">No entries yet</div>';
      return;
    }

    // Group by date
    const grouped = {};
    list.forEach(e => {
      const d = e.date || 'unknown';
      if (!grouped[d]) grouped[d] = [];
      grouped[d].push(e);
    });
    const dates = Object.keys(grouped).sort((a,b) => b.localeCompare(a));
    const today = _todayISO();

    let html = '<div class="jv-tl">';
    dates.forEach(date => {
      const isToday = date === today;
      const dateLabel = _fmtJournalDate(date);
      const wkday = _fmtJournalWeekday(date);
      html += `<div class="jv-tl-node${isToday ? ' today' : ''}"><span class="jv-tl-date">${dateLabel}</span><span class="jv-tl-wk">${wkday}</span></div>`;
      grouped[date].forEach(entry => {
        html += _renderTimelineCard(entry);
      });
    });
    html += '</div>';
    container.innerHTML = html;
  } catch(e) { console.error('Journal timeline error:', e); }
}

function _renderTimelineCard(entry) {
  const type = entry.type || 'standup';
  const typeLabel = type === 'ai_work' ? 'AI Work' : type.charAt(0).toUpperCase() + type.slice(1);
  let parsed = null;
  try { parsed = entry.parsed_data ? (typeof entry.parsed_data === 'string' ? JSON.parse(entry.parsed_data) : entry.parsed_data) : null; } catch(_) {}

  let summaryParts = [];
  let previewTexts = [];

  if (parsed) {
    if (type === 'ai_work') {
      const files = parsed.notable_files || parsed.files_changed || parsed.desktop_paths || [];
      const commands = parsed.commands_run || [];
      const changes = parsed.changes || [];
      const status = parsed.status ? `<span class="mood-i">${_escHtml(parsed.status)}</span>` : '';
      if (parsed.project_name) summaryParts.push(`<strong>${_escHtml(parsed.project_name)}</strong>`);
      else if (files.length) summaryParts.push(`<strong>${files.length} file${files.length > 1 ? 's' : ''}</strong>`);
      if (changes.length) summaryParts.push(`<span>${changes.length} change${changes.length > 1 ? 's' : ''}</span>`);
      if (commands.length) summaryParts.push(`<span>${commands.length} command${commands.length > 1 ? 's' : ''}</span>`);
      if (parsed.deploy_status) summaryParts.push(`<span>${_escHtml(parsed.deploy_status)}</span>`);
      if (status) summaryParts.push(status);
      previewTexts = [parsed.summary || parsed.latest_outcome || entry.content || ''];
    } else {
    // Actions count
    const actions = parsed.actions || [];
    if (actions.length) {
      summaryParts.push(`<strong>${actions.length} action${actions.length > 1 ? 's' : ''}</strong>`);
      previewTexts = actions.slice(0,2).map(a => typeof a === 'string' ? a : (a.text || ''));
    }
    // Reconciled summary (for reviews)
    if (parsed.reconciled && parsed.reconciled.length) {
      const done = parsed.reconciled.filter(r => r.status === 'done').length;
      const total = parsed.reconciled.length;
      summaryParts = [`<strong>${done}/${total} done</strong>`];
    }
    // Mood
    if (parsed.mood) summaryParts.push(`<span class="mood-i">${_escHtml(typeof parsed.mood === 'string' ? parsed.mood : (parsed.mood.text || ''))}</span>`);
    // Blockers
    const blockers = parsed.blockers || [];
    if (blockers.length) summaryParts.push(`<span class="block-i">${blockers.length} blocker${blockers.length > 1 ? 's' : ''}</span>`);
    // Carry-forwards
    const cfs = parsed.carry_forwards || [];
    if (cfs.length) summaryParts.push(`<span style="color:#d97706;">${cfs.length} carry-fwd</span>`);
    }
  } else {
    // Fallback: show raw text preview
    const preview = (entry.content || '').slice(0, 100);
    previewTexts = [preview];
  }

  const summaryLine = summaryParts.length ? summaryParts.join(' &middot; ') : '';
  const previewLine = previewTexts.length ? `<div class="jv-ac-preview">${previewTexts.map(t => _escHtml(t)).join(' &middot; ')}</div>` : '';

  return `<div class="jv-ac-card ${type}" onclick="_showJournalDetail(${entry.id})">
    <div class="jv-ac-type ${type}">${typeLabel}</div>
    ${summaryLine ? `<div class="jv-ac-summary">${summaryLine}</div>` : ''}
    ${previewLine}
  </div>`;
}

async function _showJournalDetail(id) {
  try {
    const res = await fetch(`/api/daily-entries/${id}`);
    const json = await res.json();
    if (!json.data) return;
    const entry = json.data;
    const type = entry.type || 'standup';
	    const dateLabel = _fmtJournalDate(entry.date);
	    const typeLabel = type === 'ai_work' ? 'AI Work' : type.charAt(0).toUpperCase() + type.slice(1);

    let parsed = null;
    try { parsed = entry.parsed_data ? (typeof entry.parsed_data === 'string' ? JSON.parse(entry.parsed_data) : entry.parsed_data) : null; } catch(_) {}

    const center = document.getElementById('centerContent');
    if (!center) return;

	    const lead = parsed && type === 'ai_work'
	      ? (parsed.summary || parsed.latest_outcome || '')
	      : (entry.content || '').slice(0, 180);
	    let html = `
	      <div class="jv-page jv-detail-page">
	        <button class="jv-detail-back" onclick="showJournalView()">&#8592; All entries</button>
	        <div class="jv-detail-header">
	          <div class="jv-eyebrow">${dateLabel}</div>
	          <div class="jv-detail-title-row">
	            <h1 class="jv-detail-title">${typeLabel}</h1>
	            <span class="jv-badge ${type}">${typeLabel}</span>
	          </div>
	          ${lead ? `<div class="jv-detail-lead">${_escHtml(lead)}</div>` : ''}
	        </div>
	    `;

    // Parsed detail block
    if (parsed) {
      html += type === 'ai_work' ? _renderAiWorkDetail(parsed) : _renderParsedDetail(parsed, type);
    }

    // Raw text block. AI work entries are already structured, so avoid duplicating
    // the same generated content below the useful summary.
    if (type !== 'ai_work') {
      html += `
	        <div class="jv-original-card">
	          <div class="jv-ps-title">Original Entry</div>
	          <div class="jv-original-text">${_escHtml(entry.content || '')}</div>
	        </div>
      `;
    }

    // Re-parse button
    if (type !== 'ai_work') {
      html += `<button class="jv-reparse-btn" id="jv-reparse-btn" onclick="_reparseJournalEntry(${id}, '${type}')">Re-parse</button>`;
    }

    html += '</div>';
    center.innerHTML = html;
  } catch(e) { console.error('Journal detail error:', e); }
}

function _renderParsedDetail(parsed, type) {
  let html = '<div class="jv-detail-card jv-parsed-block"><div class="jv-card-kicker">Parsed</div>';

  // Reconciled (review only)
  if (type === 'review' && parsed.reconciled && parsed.reconciled.length) {
    html += '<div class="jv-ps"><div class="jv-ps-title">Reconciled vs. Standup</div>';
    parsed.reconciled.forEach(r => {
      const status = (r.status || 'not_started').toLowerCase();
      let statusLabel, statusClass, textClass;
      if (status === 'done' || status === 'completed') {
        statusLabel = 'DONE'; statusClass = 'jv-st-done'; textClass = 'jv-recon-done';
      } else if (status === 'partial' || status === 'in_progress') {
        statusLabel = 'PARTIAL'; statusClass = 'jv-st-partial'; textClass = 'jv-recon-partial';
      } else {
        statusLabel = 'MISSED'; statusClass = 'jv-st-miss'; textClass = 'jv-recon-miss';
      }
      const proj = r.project ? `<span class="jv-ptag">${_escHtml(r.project)}</span>` : '';
      html += `<div class="jv-recon-item"><span class="jv-recon-status ${statusClass}">${statusLabel}</span><span class="${textClass}">${_escHtml(r.text || r.action || '')}${proj}</span></div>`;
    });
    html += '</div>';
  }

  // Actions
  if (parsed.actions && parsed.actions.length) {
    const label = type === 'standup' ? 'Planned Actions' : 'Actions';
    html += `<div class="jv-ps"><div class="jv-ps-title">${label}</div>`;
    parsed.actions.forEach(a => {
      const text = typeof a === 'string' ? a : (a.text || '');
      const proj = (typeof a === 'object' && a.project) ? `<span class="jv-ptag">${_escHtml(a.project)}</span>` : '';
      html += `<div class="jv-ps-action"><span class="arr">&#8594;</span><span>${_escHtml(text)}${proj}</span></div>`;
    });
    html += '</div>';
  }

  // Carry-forwards
  if (parsed.carry_forwards && parsed.carry_forwards.length) {
    html += '<div class="jv-ps"><div class="jv-ps-title">Carry-forwards</div>';
    parsed.carry_forwards.forEach(cf => {
      const text = typeof cf === 'string' ? cf : (cf.text || '');
      const proj = (typeof cf === 'object' && cf.project) ? `<span class="jv-ptag">${_escHtml(cf.project)}</span>` : '';
      const dayTag = (typeof cf === 'object' && cf.days_carried && cf.days_carried > 1) ? ` <span style="display:inline-block;font-size:8px;padding:2px 6px;border-radius:8px;font-weight:600;background:#fee2e2;color:#dc2626;">day ${cf.days_carried}</span>` : '';
	      html += `<div class="jv-ps-action"><span class="arr" style="color:var(--jv-amber);">&#8594;</span><span>${_escHtml(text)}${proj}${dayTag}</span></div>`;
    });
    html += '</div>';
  }

  // Blockers
  if (parsed.blockers && parsed.blockers.length) {
    html += '<div class="jv-ps"><div class="jv-ps-title">Blockers</div>';
    parsed.blockers.forEach(b => {
      const text = typeof b === 'string' ? b : (b.text || b);
      html += `<div class="jv-ps-blocker">&#9888; ${_escHtml(text)}</div>`;
    });
    html += '</div>';
  }

  // Mood / Energy
  if (parsed.mood) {
    html += '<div class="jv-ps"><div class="jv-ps-title">Mood / Energy</div>';
    const moodText = typeof parsed.mood === 'string' ? parsed.mood : (parsed.mood.text || parsed.mood.description || '');
    html += `<div class="jv-ps-mood">&#9679; ${_escHtml(moodText)}</div>`;
    const moodScore = typeof parsed.mood === 'object' ? parsed.mood.score : (parsed.mood_score || null);
    if (moodScore) {
      html += `<div style="margin-top:4px;display:flex;align-items:center;gap:6px;"><span style="font-size:9px;font-weight:700;color:#9ca3af;">SCORE</span><span style="font-size:12px;font-weight:800;color:#059669;">${moodScore}</span><span style="font-size:10px;color:#6b7280;">/5</span></div>`;
    }
    html += '</div>';
  }

  // Learnings
  if (parsed.learnings && parsed.learnings.length) {
    html += '<div class="jv-ps"><div class="jv-ps-title">Learnings</div>';
    parsed.learnings.forEach(l => {
      const text = typeof l === 'string' ? l : (l.text || '');
      html += `<div class="jv-ps-learning">&#128161; <span>${_escHtml(text)}</span></div>`;
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function _renderAiWorkDetail(parsed) {
  const files = parsed.notable_files || parsed.files_changed || parsed.desktop_paths || [];
  const changes = parsed.changes || [];
  const commands = parsed.commands_run || [];
  const tests = parsed.tests_run || [];
  const section = (title, body, full) => body ? `<div class="jv-section${full ? ' full' : ''}"><div class="jv-ps-title">${title}</div>${body}</div>` : '';
  const rows = (items, withArrow) => items.map(item => {
    const arrow = withArrow ? '<span class="jv-list-arrow">&#8594;</span>' : '';
    return `<div class="jv-list-row">${arrow}<span>${_escHtml(item)}</span></div>`;
  }).join('');

  let html = '<div class="jv-detail-card jv-ai-detail"><div class="jv-card-kicker">AI Work Summary</div>';

  if (parsed.latest_outcome) {
    html += `<div class="jv-entry-hero">${_escHtml(parsed.latest_outcome)}</div>`;
  }
  html += '<div class="jv-section-grid">';
  if (changes.length) {
    html += section('What changed', rows(changes.slice(0, 8), true), true);
  }
  if (files.length) {
    html += section('Key files', rows(files.slice(0, 8), false));
  }
  if (commands.length) {
    html += section('Commands', rows(commands.slice(0, 15), false));
  }
  if (tests.length || parsed.deploy_status) {
    html += section('Verification', rows([...tests, parsed.deploy_status].filter(Boolean), false));
  }
  if (parsed.git_branch || parsed.commit_sha || parsed.status) {
    const meta = [parsed.status, parsed.git_branch, parsed.commit_sha].filter(Boolean).join(' · ');
    html += section('Metadata', `<div class="jv-list-row"><span>${_escHtml(meta)}</span></div>`);
  }
  html += '</div>';

  html += '</div>';
  return html;
}

async function _reparseJournalEntry(id, type) {
  const btn = document.getElementById('jv-reparse-btn');
  if (btn) { btn.textContent = 'Parsing...'; btn.style.opacity = '0.6'; btn.style.pointerEvents = 'none'; }
  try {
    // Get the entry content
    const entryRes = await fetch(`/api/daily-entries/${id}`);
    const entryJson = await entryRes.json();
    if (!entryJson.data) throw new Error('Entry not found');

    const res = await fetch('/api/daily-entries/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: type, content: entryJson.data.content, id: id }),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Parse failed');
    // Reload detail view to show updated parsed data
    _showJournalDetail(id);
  } catch(e) {
    console.error('Journal re-parse error:', e);
    if (btn) { btn.textContent = 'Error - try again'; btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
  }
}

async function _saveJournalEntry() {
  const input = document.getElementById('jv-input');
  const content = input ? input.value.trim() : '';
  if (!content) return;
  const btn = document.getElementById('jv-save-btn');
  if (btn) { btn.textContent = 'Saving & parsing...'; btn.style.opacity = '0.6'; btn.style.pointerEvents = 'none'; }
  try {
    const res = await fetch('/api/daily-entries', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: _journalViewDate, type: _journalSaveType, content }),
    });
    const json = await res.json();
    const savedEntry = json.data;
    const savedId = savedEntry ? savedEntry.id : null;

    if (savedId) {
      _journalCurrentId = savedId;
      // Navigate to detail view to show parsed result
      _showJournalDetail(savedId);
    } else {
      // Fallback: reload to get ID
	      if (btn) { btn.textContent = 'Saved'; btn.style.opacity = '1'; }
	      setTimeout(() => { if (btn) { btn.textContent = 'Save'; btn.style.background = ''; } }, 1500);
      _loadJournalTimeline();
    }
  } catch(e) {
    console.error('Journal save error:', e);
	    if (btn) { btn.textContent = 'Error'; btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; }, 1500); }
  }
}

async function _loadCarryForwards() {
  const container = document.getElementById('jv-carry-forwards');
  if (!container) return;
  try {
    const res = await fetch('/api/daily-entries?type=review&limit=1');
    const json = await res.json();
    const list = json.data || [];
    if (!list.length) { container.innerHTML = ''; return; }

    const entry = list[0];
    let parsed = null;
    try { parsed = entry.parsed_data ? (typeof entry.parsed_data === 'string' ? JSON.parse(entry.parsed_data) : entry.parsed_data) : null; } catch(_) {}
    if (!parsed) { container.innerHTML = ''; return; }

    const cfs = parsed.carry_forwards || [];
    const blockers = parsed.blockers || [];
    if (!cfs.length && !blockers.length) { container.innerHTML = ''; return; }

    let html = '<div class="jv-cf-section">';
    html += '<div class="jv-cf-label">Carry-forwards from last review</div>';
    cfs.forEach(cf => {
      const text = typeof cf === 'string' ? cf : (cf.text || '');
      const proj = (typeof cf === 'object' && cf.project) ? ` <span class="jv-ptag">${_escHtml(cf.project)}</span>` : '';
      html += `<div class="jv-cf-item"><span class="arr">&#8594;</span><span>${_escHtml(text)}${proj}</span></div>`;
    });
    blockers.forEach(b => {
      const text = typeof b === 'string' ? b : (b.text || b);
      html += `<div class="jv-cf-blocker">&#9888; ${_escHtml(text)}</div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  } catch(e) {
    console.error('Carry-forward load error:', e);
    container.innerHTML = '';
  }
}

async function _renderJournalRightPanel(right) {
  if (!right) return;
  // Fetch active outcomes for context
  let outcomes = [];
  try {
    const res = await fetch('/api/outcomes?status=active&limit=5');
    const json = await res.json();
    outcomes = json.data || [];
  } catch(e) {}

  const outcomeCards = outcomes.length
    ? outcomes.map(o => {
        const color = o.energy_type === 'deep' ? '#7c3aed' : '#3b82f6';
        const proj = o.project_name || '';
	        return `<div class="jv-right-card">
	          <div class="jv-right-card-title">
	            <div class="jv-right-dot" style="background:${color};"></div>
	            <span>${_escHtml(o.title||'')}</span>
	          </div>
	          ${proj ? `<div class="jv-right-project">${_escHtml(proj)}</div>` : ''}
	        </div>`;
	      }).join('')
	    : '<div style="font-size:12px;color:var(--wp-text-tertiary);">No active outcomes</div>';

	  right.innerHTML = `
	    <div style="padding:16px 14px;">
	      <div style="margin-bottom:20px;">
	        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--wp-text-secondary);margin-bottom:8px;">Active Outcomes</div>
	        <div style="display:flex;flex-direction:column;gap:8px;">${outcomeCards}</div>
	      </div>
	      <div class="jv-tip-card">
	        <div class="jv-tip-title">Tip</div>
	        <div class="jv-tip-body">Entries auto-parse when saved. Carry-forwards and blockers from your last review appear automatically.</div>
	      </div>
	    </div>
	  `;
}
