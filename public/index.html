          </div>
          <div style="min-width:0;">
            <div style="font-size:10px;color:var(--wp-text-tertiary);margin-bottom:1px;">${dateStr}</div>
            <div style="font-size:11px;color:var(--wp-text-secondary);line-height:1.4;">${escHtml(e.content)}</div>
          </div>
        </div>`;
      }).join('') + '</div>';

  return `<div style="padding:12px 16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--wp-text-primary);">${escHtml(o.title)}</div>
        <div style="font-size:10px;color:var(--wp-text-tertiary);">${_rightPanelTimeline.length} update${_rightPanelTimeline.length !== 1 ? 's' : ''}</div>
      </div>
      <div style="font-size:9px;color:var(--wp-green);font-weight:600;background:rgba(34,197,94,0.12);padding:2px 8px;border-radius:99px;">Active</div>
    </div>
    ${summaryHtml}
    <div style="max-height:280px;overflow-y:auto;">
      ${timelineHtml}
    </div>

      <input id="timeline-input" type="text" placeholder="What happened..."
        onkeydown="if(event.key==='Enter')submitTimelineEntry()"
        style="flex:1;border:1px solid var(--wp-border-active);background:var(--wp-surface-raised);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--wp-text-primary);outline:none;" />
      <button onclick="submitTimelineEntry()"
        style="width:28px;height:28px;background:var(--wp-accent);border:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">

      </button>

async function submitTimelineEntry() {
  const input = document.getElementById('timeline-input');
  if (!input || !input.value.trim() || !selectedId) return;
  const content = input.value.trim();
  input.value = '';
  input.disabled = true;

  try {
    await fetch(`/api/outcomes/${selectedId}/timeline`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    await renderRightPanel();
    showToast('Update logged', 'success');
  } catch (e) {
    showToast('Failed to log update', 'warning');
    input.value = content;
  }
  input.disabled = false;
}

function timeAgo(dateStr) {
  const now = new Date();
  const d = new Date(dateStr);
  const diffMs = now - d;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h ago';
  const days = Math.floor(hours / 24);
  if (days === 1) return 'yesterday';
  return days + 'd ago';
}

async function addDependency(outcomeId, selectEl) {
    const dependsOnId = parseInt(selectEl.value);
    if (!dependsOnId) return;
    try {
        const res = await fetch(`/api/outcomes/${outcomeId}/dependencies`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ depends_on_outcome_id: dependsOnId }),
        });
        const data = await res.json();
        if (!res.ok) {
            showToast(data.error || 'Could not add dependency', 'warning');
            selectEl.value = '';
            return;
        }
        await fetchCriticalPath();
        await fetchOutcomeDependencies(outcomeId);
        renderRightPanel();
        renderSidebarOutcomes(); // re-render in case lock icon state changed
    } catch (_) {
        showToast('Failed to add dependency', 'warning');
    }
}

async function removeDependency(outcomeId, dependsOnId) {
    try {
        await fetch(`/api/outcomes/${outcomeId}/dependencies/${dependsOnId}`, { method: 'DELETE' });
        await fetchCriticalPath();
        await fetchOutcomeDependencies(outcomeId);
        renderRightPanel();
        renderSidebarOutcomes();
    } catch (_) {
        showToast('Failed to remove dependency', 'warning');
    }
}

// ============================================================
// TOGGLE ACTION
// ============================================================

async function toggleAction(oid, aid, checked) {
  const o = getOutcome(oid)
  if (!o) return
  const a = o.actions.find(x => x.id === aid)
  if (!a) return

  // Optimistic update
  a.done = checked
  renderSidebarOutcomes()
  renderCenter()
  renderRightPanel()

  // Phase 2.6: row flash animation on check
  if (checked) {
    const row = document.querySelector(`.action-check[data-oid="${oid}"][data-aid="${aid}"]`)?.closest('.action-row')
    if (row) {
      row.classList.add('action-row-flash')
      row.addEventListener('animationend', () => row.classList.remove('action-row-flash'), { once: true })
    }
    playSound('check')
  }

  try {
    const res = await fetch(`/api/actions/${aid}/toggle`, { method: 'PATCH' })
    if (!res.ok) throw new Error('toggle failed')
    // Sync from server (updates done_at etc.)
    await loadData()
    if (oid) await fetchOutcomeStats(oid)
    renderAll()
    const pct = OUTCOME_STATS[oid] ? Math.round(OUTCOME_STATS[oid].progress * 100) : getProgress(getOutcome(oid) || o)
    if (checked && pct === 100) {
      // Phase 2.6: confetti + completion banner
      playSound('complete')
      setTimeout(() => {
        if (typeof confetti === 'function') {
          confetti({
            particleCount: 120,
            spread: 80,
            origin: { x: 0.5, y: 0.1 },
            colors: ['#4ade80', '#22d3ee', '#a78bfa', '#f59e0b'],
          })
        }
      }, 500)
      showCompletionBanner(oid, o.title)
    } else if (checked) {
      showToast(`"${a.title}" marked complete`, 'info')
    }
  } catch (err) {
    // Revert
    a.done = !checked
    renderSidebarOutcomes()
    renderCenter()
    renderRightPanel()
    showToast('Failed to update action', 'warning')
  }
}

async function approveInboxItem(id, classification) {

// ============================================================

async function handleQuickCapture(e) {
  if (e.key !== 'Enter') return
  const v = e.target.value.trim()
  if (!v) return

  e.target.value = ''

  const outcomeSelect = document.getElementById('quickCaptureOutcome')
  const outcomeId = outcomeSelect?.value ? parseInt(outcomeSelect.value) : null

  try {
    let url, body
    if (outcomeId) {
      url  = `/api/outcomes/${outcomeId}/actions`
      body = { title: v, energy_type: 'light', time_estimate: 30 }
    } else {
      url  = '/api/actions'
      body = { title: v, energy_type: 'light', time_estimate: 30 }
    }

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    if (!res.ok) throw new Error('create failed')
    await loadData()
    if (outcomeId) {
      selectedId = outcomeId
      currentPhase = 2
      populateQuickCaptureOutcomes()
      renderPhaseIndicator()
      renderSidebarOutcomes()
      renderCenter()
      renderRightPanel()
      const outcomeName = OUTCOMES.find(o => o.id === outcomeId)?.title || 'outcome'
      showToast(`Added to "${outcomeName.length > 30 ? outcomeName.slice(0,30)+'…' : outcomeName}"`, 'success')
    } else {
      await loadUnassigned()
      renderCenter()
      renderRightPanel()
      showToast('Action saved — assign it to an outcome when ready', 'success')
    }
  } catch (err) {
    showToast('Failed to capture action', 'warning')
  }
}

// ============================================================
// FOCUS MODE
// ============================================================

function toggleFocus() {
  if (isFocusMode) return; // already in a session — toggle is a no-op

  // Find the first pending (non-done, non-blocked) action across all outcomes
  let firstPending = null;
  for (const outcome of OUTCOMES) {
    const found = (outcome.actions || []).find(a => !a.done && !a.blocked);
    if (found) { firstPending = found; break; }
  }

  if (!firstPending) {
    showToast('No pending actions to focus on', 'info');
    return;
  }

  enterFocusMode(firstPending.id);
}

function setFocusToggleState(on) {
  isFocusMode = on;
  const track  = document.getElementById('focusTrack');
  const thumb  = document.getElementById('focusThumb');
  const status = document.getElementById('focusStatus');
  const label  = document.getElementById('focusLabel');
  if (!track) return;

  if (on) {
    track.style.backgroundColor = '#3B82F6';
    thumb.style.transform = 'translateX(12px)';
    status.textContent = 'Focus mode · Notifications paused';
    status.className = 'text-blue-500 mt-0.5';
    label.style.color = '#3B82F6';
  } else {
    track.style.backgroundColor = '';
    thumb.style.transform = '';
    status.textContent = 'Normal mode · All areas active';
    status.className = 'text-gray-400 mt-0.5';
    label.style.color = '';
  }
}

async function archiveOutcome() {
  if (!selectedId) return
  try {
    const what_worked         = document.getElementById('reflectWorked')?.value.trim()  || ''
    const what_slipped        = document.getElementById('reflectSlipped')?.value.trim() || ''
    const reusable_insight    = document.getElementById('reflectInsight')?.value.trim() || ''
    const outcome_result      = selectedOutcomeResult
    const outcome_result_note = document.getElementById('resultNote')?.value.trim() || ''

    if (!outcome_result) {
      showToast("Select 'Hit it' or 'Didn\u2019t land' before archiving", 'warning')
      return
    }

    // Phase 2.6: collect stats before archiving
    const archivingId = selectedId
    const archivingOutcome = getOutcome(archivingId)
    const archivingTitle = archivingOutcome?.title || ''
    let actionsDone = 0, totalMinutes = 0
    try {
      const actRes = await fetch(`/api/outcomes/${archivingId}/actions`)
      const actData = await actRes.json()
      const acts = actData.data || []
      actionsDone = acts.filter(a => a.done).length
      totalMinutes = acts.filter(a => a.done).reduce((s, a) => s + (a.time_estimate || 0), 0)
    } catch (_) {}

    const res = await fetch(`/api/outcomes/${archivingId}/complete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ what_worked, what_slipped, reusable_insight, outcome_result, outcome_result_note }),
    })
    if (!res.ok) throw new Error('complete failed')

    const archiveData = await res.json()
    const summary = archiveData.data?.outcome_summary

    // Phase 2.6: show archive overlay
    playSound('archive')
    showArchiveOverlay(archivingTitle, actionsDone, totalMinutes)

    // Phase 4.2: show summary chip if Claude returned one
    if (summary) {
      showOutcomeSummaryChip(summary)
    }

    // Reload separately — failures here don't mask the archive success
    selectedId            = null
    currentPhase          = 1
    selectedOutcomeResult = null
    try {
      await Promise.all([loadData(), loadArchivedOutcomes(), loadTodayStats()])
      if (OUTCOMES.length > 0) selectedId = OUTCOMES[0].id
    } catch (reloadErr) {
      console.warn('Reload after archive failed:', reloadErr)
    }
    renderAll()

  } catch (err) {
    showToast('Failed to archive outcome', 'warning')
  }
}

async function saveOutcomeField(id, field, value) {
  try {
    const payload = { [field]: value === '' ? null : value }
    const res = await fetch(`/api/outcomes/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    if (!res.ok) {
      showToast('Failed to save outcome', 'warning')
      return
    }

    const outcome = OUTCOMES.find(o => o.id === id)
    if (outcome) {
      if (field === 'deadline') {
        if (value) {
          const [y, m, d] = value.split('-').map(Number)
          const dl  = new Date(y, m - 1, d)
          const now = new Date(); now.setHours(0, 0, 0, 0)
          outcome.daysLeft    = Math.max(0, Math.ceil((dl - now) / 86400000))
          outcome.deadline    = dl.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
          outcome.deadlineISO = value
        } else {
          outcome.daysLeft    = null
          outcome.deadline    = '—'
          outcome.deadlineISO = null
        }
      } else {
        outcome[field] = value
      }
    }
    showInlineSaved()
    renderAll()
  } catch (err) {
    console.error('Failed to save outcome field:', err)
  }
}

function startEditOutcomeField(outcomeId, field, spanEl, type) {
  if (spanEl.dataset.editing) return
  spanEl.dataset.editing = '1'

  const currentVal = field === 'deadline'
    ? (spanEl.dataset.iso || '')
    : (spanEl.dataset.raw != null ? spanEl.dataset.raw : spanEl.textContent.trim())

  let input

  if (type === 'date') {
    const wrap = document.createElement('div')
    wrap.style.cssText = 'display:flex;align-items:center;gap:4px'
    const di = document.createElement('input')
    di.type = 'date'
    di.value = currentVal
    di.className = 'border border-blue-300 rounded px-1 py-0.5 focus:outline-none'
    di.style.fontSize = '10px'
    const clr = document.createElement('button')
    clr.textContent = '✕ Clear'
    clr.className = 'text-gray-400 hover:text-red-400 transition-colors'
    clr.style.fontSize = '10px'
    clr.type = 'button'
    const parent = spanEl.parentNode
    const restore = () => { spanEl.dataset.editing = ''; parent.replaceChild(spanEl, wrap) }
    clr.onclick = async () => { restore(); await saveOutcomeField(outcomeId, 'deadline', null) }
    di.addEventListener('blur', async () => {
      const val = di.value || null
      restore()
      await saveOutcomeField(outcomeId, 'deadline', val)
    })
    di.addEventListener('keydown', e => {
      if (e.key === 'Escape') restore()
    })
    wrap.appendChild(di)
    wrap.appendChild(clr)
    parent.replaceChild(wrap, spanEl)
    di.focus()
    return
  }

  if (type === 'select') {
    input = document.createElement('select')
    input.className = 'border border-blue-300 rounded px-1 py-0.5 focus:outline-none'
    input.style.fontSize = '10px'
    ;['high', 'medium', 'low'].forEach(v => {
      const opt = document.createElement('option')
      opt.value = v
      opt.textContent = v.charAt(0).toUpperCase() + v.slice(1)
      opt.selected = v === currentVal.toLowerCase()
      input.appendChild(opt)
    })
  } else if (type === 'textarea') {
    input = document.createElement('textarea')
    input.rows = 2
    input.value = currentVal.replace(/^Add .*$/, '') // clear placeholder text
    input.className = 'w-full text-gray-700 bg-white border border-blue-300 rounded-lg px-2 py-1 focus:outline-none resize-none'
    input.style.fontSize = '11px'
  } else {
    input = document.createElement('input')
    input.type = 'text'
    // clear placeholder-like values
    input.value = /^Add /.test(currentVal) ? '' : currentVal
    input.className = 'text-gray-700 bg-white border border-blue-300 rounded px-1.5 py-0.5 focus:outline-none'
    input.style.minWidth = '120px'
    input.style.fontSize = spanEl.style.fontSize || '11px'
    input.style.width = '100%'
  }

  const parent = spanEl.parentNode
  parent.replaceChild(input, spanEl)
  input.focus()
  if (input.select) input.select()

  const restore = () => { spanEl.dataset.editing = ''; parent.replaceChild(spanEl, input) }

  if (type === 'select') {
    input.addEventListener('change', async () => {
      const val = input.value
      restore()
      await saveOutcomeField(outcomeId, field, val)
    })
    input.addEventListener('blur', restore)
    input.addEventListener('keydown', e => { if (e.key === 'Escape') restore() })
  } else {
    const save = async () => {
      const val = input.value.trim()
      restore()
      if (val !== currentVal) await saveOutcomeField(outcomeId, field, val || null)
    }
    input.addEventListener('blur', save)
    if (type !== 'textarea') {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur() }
        if (e.key === 'Escape') restore()
      })
    } else {
      input.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); restore() } })
    }
  }
}

async function saveActionField(id, fields) {
  try {
    const res = await fetch(`/api/actions/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(fields),
    })
    if (!res.ok) return

    for (const outcome of OUTCOMES) {
      const action = (outcome.actions || []).find(a => a.id === id)
      if (action) {
        Object.assign(action, fields)
        if ('energy_type' in fields) action.energy    = fields.energy_type || 'light'
        if ('time_estimate' in fields) action.time    = fields.time_estimate || 0
        if ('blocked_by' in fields) action.blockedBy  = fields.blocked_by || ''
        if ('blocked' in fields) action.blocked       = !!fields.blocked
        if ('title' in fields) action.title           = fields.title
        break
      }
    }
    renderAll()
  } catch (err) {
    console.error('Failed to save action field:', err)
  }
}

let cmdContext  = null

// HTML-escape helper
function escHtml(s) {
  if (s == null) return ''
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function buildContext(overrideOutcome) {
  const outcome = overrideOutcome || (selectedId && currentPhase === 2 ? getOutcome(selectedId) : null)
  const currentProject = outcome
    ? PROJECTS.find(p => p.id === outcome.project_id) || null
    : (PROJECTS.length > 0 ? PROJECTS[0] : null)
  const stats = outcome ? OUTCOME_STATS[outcome.id] : null

  return {
    current_project: currentProject
      ? { id: currentProject.id, name: currentProject.name }
      : null,
    selected_outcome: outcome ? {
      id:            outcome.id,
      title:         outcome.title,
      deadline:      outcome.deadlineISO || null,
      deadline_risk: stats ? stats.deadline_risk : null,
      actions:       outcome.actions.map(a => ({
        id:            a.id,
        title:         a.title,
        time_estimate: a.time,
        energy_type:   a.energy,
        done:          a.done,
      })),
    } : null,
    active_outcomes: OUTCOMES.filter(o => o.status === 'active').map(o => {
      const s    = OUTCOME_STATS[o.id]
      const proj = PROJECTS.find(p => p.id === o.project_id)
      return {
        id:                 o.id,
        title:              o.title,
        project_name:       proj ? proj.name : (o.project || 'Unknown'),
        deadline:           o.deadlineISO || null,
        deadline_risk:      s ? s.deadline_risk : null,
        total_actions:      o.actions.length,
        completed_actions:  o.actions.filter(a => a.done).length,
      }
    }),
    projects:    PROJECTS.map(p => ({ id: p.id, name: p.name })),
    today_stats: TODAY_STATS,
  }
}

function openCommandPalette(presetOutcome, presetText) {
  presetOutcome = presetOutcome || null
  presetText    = presetText    || ''
  cmdContext    = buildContext(presetOutcome)
  cmdToolData   = null
  document.getElementById('cmdPaletteOverlay').classList.remove('hidden')
  renderCmdInput(presetText)
  setTimeout(() => { const i = document.getElementById('cmdInput'); if (i) i.focus() }, 30)
}

function openCommandPaletteForOutcome(outcomeId) {
  openCommandPalette(getOutcome(outcomeId), 'Break this outcome into actions')
}

function closeCommandPalette() {
  document.getElementById('cmdPaletteOverlay').classList.add('hidden')
  cmdContext  = null
  cmdToolData = null
}

function renderCmdInput(presetText) {
  presetText = presetText || ''
  const outcome = cmdContext && cmdContext.selected_outcome ? cmdContext.selected_outcome : null

  const contextBadge = outcome
    ? `<div class="px-4 py-2 bg-purple-50 border-b border-purple-100 flex items-center gap-2">

       </div>`
    : ''

  const suggestions = [
    { text: 'Break this outcome into actions',  show: !!outcome },
    { text: 'What should I prioritize today?',  show: true },
    { text: 'Push all deadlines back 2 weeks',  show: OUTCOMES.length > 0 },
    { text: 'Convert my notes into outcomes',   show: true },
  ].filter(s => s.show)

  const suggestHtml = suggestions.map(s =>
    `<button onclick="setCmdText('${s.text.replace(/'/g, "\\'")}'); document.getElementById('cmdInput').focus()"
       class="px-2 py-1 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-lg transition-colors"
       style="font-size:10px;white-space:nowrap">${s.text}</button>`
  ).join('')

         style="font-size:14px;background:transparent"
         onkeydown="handleCmdKeydown(event)">
     </div>
     ${contextBadge}
     <div class="px-4 py-2.5 border-t border-gray-100 flex items-center justify-between gap-3">
       <div class="flex gap-1.5 flex-wrap">${suggestHtml}</div>
       <button onclick="submitCommandPalette()"
         class="flex items-center gap-1 bg-gray-900 text-white font-medium rounded-lg hover:bg-gray-700 transition-colors shrink-0"
         style="font-size:11px;padding:6px 12px">
         Ask Claude
       </button>
     </div>`

  const inp = document.getElementById('cmdInput')
  if (inp && presetText) inp.value = presetText
}

function setCmdText(text) {
  const inp = document.getElementById('cmdInput')
  if (inp) { inp.value = text; inp.focus() }
}

function handleCmdKeydown(e) {
  if (e.key === 'Enter')  { e.preventDefault(); submitCommandPalette() }
  if (e.key === 'Escape') { closeCommandPalette() }
}

function renderCmdLoading() {
  document.getElementById('cmdPaletteContent').innerHTML =
    `<div class="flex items-center justify-center gap-3 px-4 py-8">
       <div style="width:16px;height:16px;border:2px solid #E5E7EB;border-top-color:#6B7280;border-radius:50%;animation:spin 0.7s linear infinite"></div>
       <span class="text-gray-500" style="font-size:12px">Claude is thinking…</span>
     </div>`
}

async function submitCommandPalette() {
  const inp     = document.getElementById('cmdInput')
  const message = inp ? inp.value.trim() : ''
  if (!message) return

  renderCmdLoading()

  try {
    const res = await fetch('/api/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message, context: cmdContext, mode: 'tools' }),
    })
    if (!res.ok) throw new Error(`API error ${res.status}`)
    const data = await res.json()
    if (!data.success) throw new Error(data.error || 'Unknown error')

    const result = data.data
    if (result.type === 'tool') {
      cmdToolData = result.tool_input
      if (result.tool_name === 'break_into_actions') {
        const { actions = [], questions = [] } = result.tool_input;
        if (questions.length > 0) {
          renderBreakdownQuestions(questions, cmdContext?.selected_outcome?.id, actions);
        } else {
          renderCmdBreak(actions);
        }
      }
      else if (result.tool_name === 'brain_dump_to_outcomes') renderCmdDump(result.tool_input.outcomes)
      else if (result.tool_name === 'bulk_reschedule')        renderCmdReschedule(result.tool_input.updates)
      else if (result.tool_name === 'prioritize_today')       renderCmdPrioritize(result.tool_input)
      else renderCmdMessage('Claude responded with an unexpected action. Please try again.')
    } else {
      renderCmdMessage(result.content || '')
    }
  } catch (err) {
    renderCmdMessage('Something went wrong: ' + err.message, true)
  }
}

  btn.textContent     = next === 'deep' ? 'Deep' : 'Light'
  btn.style.background = next === 'deep' ? '#EFF6FF' : '#F5F3FF'
  btn.style.color      = next === 'deep' ? '#1D4ED8' : '#7C3AED'

async function createAcceptedActions(outcomeId) {
  const toCreate = []
  let i = 0
  while (document.getElementById('bacc-' + i)) {
    const cb = document.getElementById('bacc-' + i)
    if (cb && cb.checked) {
      const title  = (document.getElementById('btit-' + i) || {}).value
      const timeV  = (document.getElementById('btim-' + i) || {}).value
      const energy = ((document.getElementById('beng-' + i) || {}).dataset || {}).energy || 'light'
      if (title && title.trim()) {
        toCreate.push({ title: title.trim(), time_estimate: timeV ? parseInt(timeV) : null, energy_type: energy })
      }
    }
    i++
  }

  if (!toCreate.length) { showToast('No actions selected', 'warning'); return }

  const btn = document.getElementById('bCreateBtn')
  if (btn) { btn.textContent = 'Creating…'; btn.disabled = true }

  try {
    const url = outcomeId ? `/api/outcomes/${outcomeId}/actions` : '/api/actions'
    for (const action of toCreate) {
      const r = await fetch(url, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(action),
      })
      if (!r.ok) throw new Error('Create failed')
    }
    closeCommandPalette()
    await loadData()
    if (outcomeId) {
      selectedId   = outcomeId
      currentPhase = 2
      await fetchOutcomeStats(outcomeId)
    }
    renderAll()
    showToast(`${toCreate.length} action${toCreate.length !== 1 ? 's' : ''} created`, 'success')
  } catch (err) {
    showToast('Failed to create some actions', 'warning')
    if (btn) { btn.textContent = 'Create Accepted Actions'; btn.disabled = false }
  }
}

async function createDumpOutcomes() {
  if (!cmdToolData || !cmdToolData.outcomes) return
  const outcomes = cmdToolData.outcomes
  let created = 0, skipped = 0

  const btn = document.getElementById('dCreateBtn')
  if (btn) { btn.textContent = 'Creating…'; btn.disabled = true }

  for (let i = 0; i < outcomes.length; i++) {
    const cb = document.getElementById('dacc-' + i)
    if (!cb || !cb.checked) continue

    const projectId = (document.getElementById('dprj-' + i) || {}).value
    if (!projectId) { skipped++; continue }

    const dlInput = document.getElementById('ddl-' + i)
    const deadline = dlInput ? (dlInput.value || null) : null

    try {
      const oRes = await fetch('/api/outcomes', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          project_id: parseInt(projectId),
          title:      outcomes[i].title || 'Untitled',
          deadline,
          priority:   outcomes[i].priority || 'medium',
        }),
      })
      if (!oRes.ok) throw new Error('Outcome create failed')
      const oData     = await oRes.json()
      const newOutId  = oData.data.id

      for (const a of (outcomes[i].actions || [])) {
        await fetch(`/api/outcomes/${newOutId}/actions`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ title: a.title, time_estimate: a.time_estimate || null, energy_type: a.energy_type || 'light' }),
        })
      }
      created++
    } catch (err) {
      skipped++
    }
  }

  closeCommandPalette()
  await loadData()
  renderAll()
  showToast(
    skipped > 0
      ? `${created} created, ${skipped} skipped (no project selected)`
      : `${created} outcome${created !== 1 ? 's' : ''} created`,
    skipped > 0 ? 'warning' : 'success'
  )
}

  showToast(
    applied > 0

      : 'No changes applied',
    applied > 0 ? 'success' : 'warning'
  )

// KEYBOARD
// ============================================================

document.addEventListener('keydown', e => {
  // ⌘1–4 / Ctrl+1–4 — phase switching
  if ((e.metaKey || e.ctrlKey) && ['1','2','3','4'].includes(e.key)) {
    e.preventDefault()
    if (e.key === '4') { openInboxView(); return }
    setPhase(parseInt(e.key))
    return
  }

  // ⌘K / Ctrl+K — toggle command palette
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault()
    const overlay = document.getElementById('cmdPaletteOverlay')
    if (overlay && !overlay.classList.contains('hidden')) {
      closeCommandPalette()
    } else {
      openCommandPalette()
    }
    return
  }

  // ESC — close command palette if open
  if (e.key === 'Escape') {
    const overlay = document.getElementById('cmdPaletteOverlay')
    if (overlay && !overlay.classList.contains('hidden')) {
      closeCommandPalette()
    }
  }

  // F key — focus mode for first pending action in selected outcome
  if ((e.key === 'f' || e.key === 'F') && !e.metaKey && !e.ctrlKey) {
    if (['INPUT', 'TEXTAREA'].includes(e.target.tagName) || e.target.isContentEditable) return;
    if (currentPhase === 2 && selectedId) {
      const outcome = OUTCOMES.find(o => o.id === selectedId);
      const firstPending = (outcome?.actions || []).find(a => !a.done);
      if (firstPending) enterFocusMode(firstPending.id);
    }
  }
})

  // Update active tab styling
  document.querySelectorAll('.mobile-tab').forEach(btn => {
    btn.classList.toggle('mobile-tab-active', btn.dataset.tab === tab)
  })

  if (tab === 'home') {
    currentPhase = 0   // Home is mobile-only; other render fns guard against phase 0
    renderMobileHome()
    document.getElementById('mobileHomePanel').classList.remove('hidden')
    document.getElementById('centerContent').closest('main').classList.add('hidden')
  } else {
    document.getElementById('mobileHomePanel')?.classList.add('hidden')
    document.getElementById('centerContent').closest('main').classList.remove('hidden')
    if (tab === 'outcomes') setPhase(1)
    if (tab === 'inbox')    openInboxView()
    // 'ai' is handled by openFabSheet() directly — no phase switch needed
  }
}

async function handleMobileQuickCapture(e) {
  if (e.key !== 'Enter') return
  const v = e.target.value.trim()
  if (!v) return
  e.target.value = ''

  const outcomeSelect = document.getElementById('mobileQuickCaptureOutcome')
  const outcomeId = outcomeSelect?.value ? parseInt(outcomeSelect.value) : null

  try {
    const url  = outcomeId ? `/api/outcomes/${outcomeId}/actions` : '/api/actions'
    const body = { title: v, energy_type: 'light', time_estimate: 30 }
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    if (!res.ok) throw new Error('create failed')
    await loadData()
    showToast(outcomeId ? 'Action captured' : 'Action captured (unassigned)', 'success')
    renderMobileHome()
  } catch (err) {
    showToast('Failed to capture action', 'warning')
  }
}

function setFabMode(mode) {
  fabMode = mode
  const isCapture = mode === 'capture'
  document.getElementById('fabModeCapture').className = isCapture
    ? 'flex-1 py-1.5 rounded-md text-gray-700 font-medium bg-white shadow-sm'

function handleFabInput(e) {

  if (fabMode === 'ai')      submitFabAI()

function populateFabOutcomePicker() {

async function submitFabCapture() {
  const input  = document.getElementById('fabInput')
  const title  = input ? input.value.trim() : ''
  if (!title) return

  const outcomeSelect = document.getElementById('fabOutcomeSelect')
  const outcomeId     = outcomeSelect?.value ? parseInt(outcomeSelect.value) : null
  const url           = outcomeId ? `/api/outcomes/${outcomeId}/actions` : '/api/actions'

  try {
    const res = await fetch(url, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ title, energy_type: 'light', time_estimate: 30 }),
    })
    if (!res.ok) throw new Error('create failed')
    closeFabSheet()
    await loadData()
    if (outcomeId) {
      selectedId = outcomeId
      setMobileTab('outcomes')
    } else if (currentPhase === 0) {
      renderMobileHome()
    }
    renderSidebarOutcomes()
    renderSidebarStats()
    showToast(outcomeId ? 'Action captured' : 'Action captured (unassigned)', 'success')
  } catch (err) {
    showToast('Failed to capture action', 'warning')
  }
}

async function submitFabAI() {
  if (!FEATURES.aiPalette) {
    showToast('AI palette coming soon', 'info')
    return
  }

  const input   = document.getElementById('fabInput')
  const message = input ? input.value.trim() : ''
  if (!message) return

  const responseEl = document.getElementById('fabAIResponse')
  responseEl.innerHTML = '<div class="text-gray-400" style="font-size:13px">Thinking…</div>'
  responseEl.classList.remove('hidden')

  try {
    cmdContext = buildContext(null)
    const res = await fetch('/api/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message, context: cmdContext, mode: 'tools' }),
    })
    if (!res.ok) throw new Error(`API error ${res.status}`)
    const data = await res.json()
    if (!data.success) throw new Error(data.error || 'Unknown error')

    const result = data.data
    if (result.type === 'message') {
      // Plain text response — render inline in sheet
      responseEl.innerHTML = escHtml(result.content || '').replace(/\n/g, '<br>')
    } else {
      // Tool response — close sheet and open full command palette review UI
      closeFabSheet()
      cmdToolData = result.tool_input
      document.getElementById('cmdPaletteOverlay').classList.remove('hidden')
      if (result.tool_name === 'break_into_actions') {
        const { actions = [], questions = [] } = result.tool_input;
        if (questions.length > 0) {
          renderBreakdownQuestions(questions, cmdContext?.selected_outcome?.id, actions);
        } else {
          renderCmdBreak(result.tool_input.actions);
        }
      }
      else if (result.tool_name === 'brain_dump_to_outcomes')  renderCmdDump(result.tool_input.outcomes)
      else if (result.tool_name === 'bulk_reschedule')         renderCmdReschedule(result.tool_input.updates)
      else if (result.tool_name === 'prioritize_today')        renderCmdPrioritize(result.tool_input)
      else renderCmdMessage('Claude responded with an unexpected action. Please try again.')
    }
  } catch (err) {
    responseEl.innerHTML = `<div class="text-red-500" style="font-size:13px">Something went wrong: ${escHtml(err.message)}</div>`
  }
}

let _clockInterval = null;

function startLiveClock(elementId) {
  clearInterval(_clockInterval);
  function update() {
    const el = document.getElementById(elementId);
    if (!el) { clearInterval(_clockInterval); return; }
    const now = new Date();
    const h = now.getHours() % 12 || 12;
    const m = now.getMinutes().toString().padStart(2, '0');
    const ampm = now.getHours() >= 12 ? 'pm' : 'am';
    el.textContent = `${h}:${m}${ampm}`;
  }
  update();
  _clockInterval = setInterval(update, 60000);
}

async function showTodayView() {
  setViewActive('nav-today');
  clearInterval(_clockInterval);
  const center = document.getElementById('centerContent');
  const right = document.getElementById('rightPanel');

  if (center) center.innerHTML = '<div style="padding:32px;text-align:center;color:#9ca3af;font-size:13px;">Loading today...</div>';
  if (right) renderRightPanel();

  try {
    const statusRes = await fetch('/api/today/status');
    const statusData = await statusRes.json();
    const { state, plan, committedIds = [], completedIds = [] } = statusData.data || {};

    // Also fetch calendar data (non-blocking)
    let calendarData = { events: [], windows: [] };
    try {
      const calRes = await fetch('/api/calendar/today');
      const calJson = await calRes.json();
      calendarData = calJson.data || { events: [], windows: [] };
    } catch (_) {}

    const today = new Date();
    const dayLabel = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    if (!plan || state === 'no_plan' || state === 'proposal') {
      // PROPOSAL STATE: generate or show plan
      if (center) center.innerHTML = '<div style="padding:32px;text-align:center;color:#9ca3af;font-size:13px;">Building your plan...</div>';

      let proposal = null;
      try {
        const propRes = await fetch('/api/today/propose', { method: 'POST' });
        const propData = await propRes.json();
        proposal = propData.data || {};
      } catch (_) {}

      renderTodayProposalState(center, right, dayLabel, calendarData, proposal);
    } else if (state === 'eod') {
      renderTodayEODState(center, right, dayLabel, plan, committedIds, completedIds);
    } else {
      // ACTIVE STATE
      renderTodayActiveState(center, right, dayLabel, plan, committedIds, completedIds, calendarData);
    }
  } catch (err) {
    if (center) center.innerHTML = '<div style="padding:32px;text-align:center;color:#9ca3af;font-size:13px;">Today view — connect Google Calendar to enable.</div>';
  }
}

function renderTodayProposalState(center, right, dayLabel, calendarData, proposal) {
  const { committed_actions = [], available_minutes = 0, committed_minutes = 0, flags = [] } = proposal || {};

  // Get action details from OUTCOMES global
  const actionDetails = committed_actions.map(ca => {
    let found = null;
    for (const o of OUTCOMES) {
      const a = (o.actions || []).find(ac => ac.id === ca.action_id);
      if (a) { found = { ...a, outcome_title: o.title, outcome_id: o.id }; break; }
    }
    return found ? { ...found, reason: ca.reason } : null;
  }).filter(Boolean);

  const actionCards = actionDetails.map(a => {
    const dot = a.energy === 'deep' ? '#7c3aed' : '#3b82f6';
    const label = a.energy === 'deep' ? 'Deep' : 'Light';
    const timeStr = a.time ? fmt(a.time) : '';
    return `<div style="background:white;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;">
      <div style="width:8px;height:8px;background:${dot};border-radius:50%;margin-top:4px;flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:600;color:#111827;">${escHtml(a.title)}</div>
        <div style="font-size:10px;color:#6b7280;margin-top:2px;">${escHtml(a.outcome_title || '')} ${timeStr ? '· ' + timeStr : ''}</div>
      </div>
      <span style="font-size:9px;padding:2px 6px;border-radius:10px;background:${a.energy === 'deep' ? '#ede9fe' : '#eff6ff'};color:${dot};font-weight:600;">${label}</span>
    </div>`;
  }).join('');

  const flagCards = flags.map(f => `
    <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:11px;color:#c2410c;">
      ⚠ ${escHtml(f)}
    </div>
  `).join('');

  const availHours = available_minutes >= 60 ? `${(available_minutes/60).toFixed(1)}h` : `${available_minutes}m`;
  const commitHours = committed_minutes >= 60 ? `${(committed_minutes/60).toFixed(1)}h` : `${committed_minutes}m`;
  const pct = available_minutes > 0 ? Math.min(100, Math.round(committed_minutes / available_minutes * 100)) : 0;
  const barColor = pct > 90 ? '#ef4444' : '#3b82f6';

  const eventPills = (calendarData.events || []).map(e => {
    const start = new Date(e.start_at);
    const end = new Date(e.end_at);
    const dur = Math.round((end - start) / 60000);
    const timeStr = start.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    return `<div style="background:#f3f4f6;border-radius:20px;padding:4px 10px;font-size:10px;color:#374151;white-space:nowrap;flex-shrink:0;">${escHtml(e.title)} · ${timeStr}${dur ? ', ' + (dur >= 60 ? Math.round(dur/60)+'h' : dur+'m') : ''}</div>`;
  }).join('');

  if (center) center.innerHTML = `<div style="padding:24px;max-width:680px;">
    <div style="margin-bottom:20px;">
      <div style="font-size:15px;font-weight:600;color:#111827;">Today · ${escHtml(dayLabel)}</div>
      <div style="font-size:12px;color:#6b7280;margin-top:2px;">${availHours} available · Claude's suggested plan</div>
    </div>
    ${eventPills ? `<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;">${eventPills}</div>` : ''}
    <div style="font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Claude's Suggested Plan</div>
    ${actionCards || '<div style="color:#9ca3af;font-size:12px;padding:16px 0;">No actions suggested — add outcomes and actions first.</div>'}
    ${flagCards}
    <div style="margin:16px 0;">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#6b7280;margin-bottom:4px;">
        <span>Committed: ${commitHours}</span>
        <span>Available: ${availHours}</span>
      </div>
      <div style="height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${barColor};border-radius:3px;transition:width .5s;"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:20px;">
      <button onclick="confirmTodayPlan(${JSON.stringify(committed_actions).replace(/"/g,'&quot;')})"
        style="flex:1;padding:10px;background:#111827;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;">
        Confirm plan →
      </button>
      <button onclick="showTodayView()"
        style="padding:10px 16px;background:transparent;border:1px solid #e5e7eb;border-radius:10px;font-size:12px;color:#6b7280;cursor:pointer;">
        Adjust

function renderTodayActiveState(center, right, dayLabel, plan, committedIds, completedIds, calendarData) {
  const remaining = committedIds.filter(id => !completedIds.includes(id));
  const total = committedIds.length;
  const done = completedIds.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  // Get action details
  const getAction = (id) => {
    for (const o of OUTCOMES) {
      const a = (o.actions || []).find(ac => ac.id === id);
      if (a) return { ...a, outcome_title: o.title };
    }
    return null;
  };

  const committedDetails = committedIds.map(id => getAction(id)).filter(Boolean);

function renderTodayRightPanel(right, calendarData, state) {
  if (!right) return;
  const events = calendarData.events || [];
  const windows = calendarData.windows || [];
  const now = new Date();

  const eventCards = events.map(e => {
    const start = new Date(e.start_at);
    const end = new Date(e.end_at);
    const isPast = end < now;
    const isCurrent = start <= now && end >= now;
    const startStr = start.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    const endStr = end.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    const dur = Math.round((end - start) / 60000);
    const bg = isCurrent ? '#eff6ff' : 'white';
    const border = isCurrent ? '#dbeafe' : '#e5e7eb';
    const opacity = isPast ? '0.5' : '1';
    const badge = isCurrent ? '<span style="font-size:9px;background:#dbeafe;color:#3b82f6;border-radius:8px;padding:1px 6px;font-weight:600;">Now</span>' : '';
    return `<div style="background:${bg};border:1px solid ${border};border-radius:8px;padding:8px 10px;margin-bottom:6px;opacity:${opacity};">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
        <span style="font-size:11px;font-weight:600;color:#111827;flex:1;">${escHtml(e.title)}</span>
        ${badge}
      </div>
      <div style="font-size:10px;color:#6b7280;">${startStr} – ${endStr} · ${dur >= 60 ? Math.round(dur/60)+'h' : dur+'m'}</div>
    </div>`;
  }).join('');

  const windowCards = windows.map(w => {
    const start = new Date(w.start_at);
    const end = new Date(w.end_at);
    const isCurrent = start <= now && end >= now;
    const startStr = start.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    const endStr = end.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    const bg = isCurrent ? '#f0fdf4' : '#f9fafb';
    const border = isCurrent ? '#bbf7d0' : '#f3f4f6';
    const label = isCurrent ? 'Now · Deep work block' : `${startStr} – ${endStr}`;
    return `<div style="background:${bg};border:1px solid ${border};border-radius:8px;padding:8px 10px;margin-bottom:6px;">
      <div style="font-size:11px;font-weight:600;color:${isCurrent ? '#059669' : '#374151'};">${label}</div>
      <div style="font-size:10px;color:#6b7280;">${w.duration_minutes >= 60 ? (w.duration_minutes/60).toFixed(1)+'h' : w.duration_minutes+'m'} available</div>
    </div>`;
  }).join('');

  right.innerHTML = `<div style="padding:16px;">
    <div style="font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;">Calendar Today</div>
    <div style="font-size:11px;color:${events.length > 0 ? '#10b981' : '#6b7280'};margin-bottom:12px;">
      ${events.length > 0 ? '● Connected · ' + events.length + ' event' + (events.length !== 1 ? 's' : '') : '○ No events loaded'}
    </div>
    ${eventCards || '<div style="font-size:11px;color:#9ca3af;padding:8px 0;">No events today.</div>'}
    ${windows.length > 0 ? `<div style="font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-top:16px;margin-bottom:8px;">Available Blocks</div>${windowCards}` : ''}
  </div>`;
}

async function confirmTodayPlan(committedActions) {
  try {
    const actionIds = (committedActions || []).map(ca => ca.action_id).filter(Boolean);
    const outcomeIds = [...new Set((committedActions || []).map(ca => ca.outcome_id).filter(Boolean))];
    await fetch('/api/today/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action_ids: actionIds,
        outcome_ids: outcomeIds,
        available_minutes: 480,
      }),
    });
    showToast('Plan confirmed!', 'success');
    showTodayView();
  } catch (err) {
    showToast('Failed to confirm plan', 'warning');
  }
}

let _libraryActiveTag = null;
let _librarySelectedEntry = null;

function debounceLibrarySearch(q) {

        </div>
      </div>`;

async function loadLibraryEntries(q, tag) {
  _libraryActiveTag = tag;
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (tag) params.set('tag', tag);

  try {
    const res = await fetch('/api/library?' + params.toString());
    const json = await res.json();
    const entries = json.data || [];

    // Build tag filters from all entries
    const allTags = new Set();
    entries.forEach(e => {
      try { (JSON.parse(e.tags || '[]')).forEach(t => allTags.add(t)); } catch {}
    });

    const tagFiltersEl = document.getElementById('library-tag-filters');
    if (tagFiltersEl) {
      const tagPills = ['All', ...allTags].map(t => {
        const isActive = (t === 'All' && !tag) || t === tag;
        return `<button onclick="loadLibraryEntries('', ${t === 'All' ? 'null' : JSON.stringify(t)})"
          style="padding:4px 10px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid ${isActive ? '#111827' : '#e5e7eb'};background:${isActive ? '#111827' : 'transparent'};color:${isActive ? '#fff' : '#6b7280'};">
          ${escHtml(t)}
        </button>`;
      }).join('');
      tagFiltersEl.innerHTML = tagPills;
    }

    const listEl = document.getElementById('library-entry-list');
    if (!listEl) return;

    if (entries.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;color:#9ca3af;font-size:12px;padding:32px 0;">No saved outputs yet. Save Claude responses from Focus Mode to build your Library.</div>';
      return;
    }

    listEl.innerHTML = entries.map(e => {
      const tags = (() => { try { return JSON.parse(e.tags || '[]'); } catch { return []; } })();
      const tagPills = tags.map(t => `<span style="background:#f3f4f6;border-radius:20px;padding:2px 7px;font-size:9px;color:#6b7280;">${escHtml(t)}</span>`).join(' ');
      const preview = (e.value || '').slice(0, 180);
      const isSelected = _librarySelectedEntry && _librarySelectedEntry.id === e.id;
      return `<div onclick="openLibraryEntry(${e.id})"
        style="background:white;border:1px solid ${isSelected ? '#111827' : '#e5e7eb'};border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.1s;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;">
          <div style="font-size:12px;font-weight:600;color:#111827;flex:1;">${escHtml(e.title || e.key || 'Untitled')}</div>
          <span style="font-size:10px;color:#9ca3af;white-space:nowrap;">${new Date(e.created_at || e.updated_at).toLocaleDateString('en-US', {month:'short', day:'numeric'})}</span>
        </div>
        <div style="font-size:11px;color:#6b7280;margin-bottom:8px;line-height:1.5;overflow:hidden;max-height:40px;">${escHtml(preview)}${preview.length < (e.value || '').length ? '…' : ''}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;">${tagPills}</div>
      </div>`;
    }).join('');
  } catch (err) {
    const listEl = document.getElementById('library-entry-list');
    if (listEl) listEl.innerHTML = '<div style="text-align:center;color:#ef4444;font-size:12px;padding:32px 0;">Failed to load Library.</div>';
  }
}

async function openLibraryEntry(id) {
  try {
    const res = await fetch(`/api/library/${id}`);
    const json = await res.json();
    const entry = json.data;
    if (!entry) return;
    _librarySelectedEntry = entry;
    renderLibraryDetail(entry);
    // Refresh list to highlight selected
    const q = document.getElementById('library-search')?.value || '';
    loadLibraryEntries(q, _libraryActiveTag);
  } catch {}
}

// Phase 4.0 — Open a Library entry in Focus Mode with pre-injected context
async function openLibraryEntryInFocus(entryId) {
  try {
    const res = await fetch(`/api/library/${entryId}`);
    const data = await res.json();
    const entry = data.data;
    if (!entry) return;

    // Stash the Library context so enterFocusMode can inject it
    window._libraryFocusContext = {
      title: entry.title || entry.key || 'Library entry',
      content: entry.value || '',
    };

    // Open Focus Mode — pass null for actionId (library-driven session, no specific action)
    enterFocusMode(null, null);
  } catch (err) {
    console.error('[Library] Failed to open in Focus:', err);
  }
}

      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px;" id="entry-tags-${entry.id}" data-tags='${escHtml(JSON.stringify(tags))}'>
        ${tagPills}
        <button onclick="addTagToEntry(${entry.id}, document.getElementById('entry-tags-${entry.id}'))"
          style="padding:3px 9px;border:1px dashed #d1d5db;border-radius:20px;font-size:10px;color:#9ca3af;background:transparent;cursor:pointer;">
          + tag
        </button>
      </div>

      <div style="font-size:10px;color:#9ca3af;margin-bottom:12px;">${dateStr} · ${wordCount} words · ${escHtml(entry.source || 'focus_mode')}</div>

      <div id="entry-content-${entry.id}" style="font-size:11px;color:#374151;line-height:1.7;white-space:pre-wrap;${isLong ? 'max-height:180px;overflow:hidden;' : ''}margin-bottom:8px;">${escHtml(entry.value || '')}</div>
      ${isLong ? `<button onclick="toggleLibraryEntryExpand(${entry.id})" id="expand-btn-${entry.id}" style="font-size:10px;color:#6b7280;background:transparent;border:none;cursor:pointer;padding:2px 0;margin-bottom:12px;">Show more</button>` : ''}

      <div style="display:flex;flex-direction:column;gap:6px;margin-top:12px;">

          style="width:100%;padding:7px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;font-size:11px;color:#374151;cursor:pointer;">
          Copy
        </button>
        <button onclick="deleteLibraryEntry(${entry.id})"

}

function toggleLibraryEntryExpand(id) {
  const el = document.getElementById(`entry-content-${id}`);
  const btn = document.getElementById(`expand-btn-${id}`);
  if (!el) return;
  if (el.style.maxHeight) {
    el.style.maxHeight = '';
    el.style.overflow = '';
    if (btn) btn.textContent = 'Show less';
  } else {
    el.style.maxHeight = '180px';
    el.style.overflow = 'hidden';
    if (btn) btn.textContent = 'Show more';
  }
}

async function saveLibraryTitle(id, title) {
  if (!title.trim()) return;
  try {
    await fetch(`/api/library/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title.trim() }),
    });
  } catch {}
}

function addTagToEntry(entryId, entryTagsEl) {
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'new tag';
  input.style.cssText = 'border:1px dashed #d1d5db;border-radius:20px;padding:3px 9px;font-size:10px;outline:none;width:80px;';

  const saveTag = async () => {
    const tag = input.value.trim().replace(/^#/, '').toLowerCase().replace(/\s+/g, '_');
    if (!tag) { input.remove(); return; }
    const current = JSON.parse(entryTagsEl.dataset.tags || '[]');
    const updated = [...new Set([...current, tag])];
    try {
      await fetch(`/api/library/${entryId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tags: updated }),
      });
      const res = await fetch(`/api/library/${entryId}`);
      const json = await res.json();
      if (json.data) renderLibraryDetail(json.data);
    } catch {}
  };

  input.addEventListener('blur', saveTag);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveTag(); }
    if (e.key === 'Escape') input.remove();
  });
  entryTagsEl.insertBefore(input, entryTagsEl.lastElementChild);
  input.focus();
}

async function removeTagFromEntry(entryId, tag) {
  try {
    const res = await fetch(`/api/library/${entryId}`);
    const json = await res.json();
    const entry = json.data;
    if (!entry) return;
    const current = JSON.parse(entry.tags || '[]');
    const updated = current.filter(t => t !== tag);
    await fetch(`/api/library/${entryId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tags: updated }),
    });
    const updated_res = await fetch(`/api/library/${entryId}`);
    const updated_json = await updated_res.json();
    if (updated_json.data) renderLibraryDetail(updated_json.data);
  } catch {}
}

async function deleteLibraryEntry(id) {
  if (!confirm('Delete this library entry? This cannot be undone.')) return;
  try {
    await fetch(`/api/library/${id}`, { method: 'DELETE' });
    _librarySelectedEntry = null;
    const right = document.getElementById('rightPanel');
    if (right) renderRightPanel();
    const q = document.getElementById('library-search')?.value || '';
    loadLibraryEntries(q, _libraryActiveTag);
    showToast('Entry deleted', 'success');
  } catch {
    showToast('Failed to delete entry', 'warning');
  }
}

      <div style="font-size:13px;font-weight:600;color:#111827;margin-bottom:12px;">Save to Library</div>
      <textarea id="manual-save-content" rows="6" placeholder="Paste or type your work output…"
        style="width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px;font-size:12px;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button onclick="submitManualSave()"
          style="flex:1;padding:9px;background:#111827;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">
          Save
        </button>
        <button onclick="document.getElementById('manual-save-modal').remove()"
          style="padding:9px 16px;background:transparent;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;color:#6b7280;cursor:pointer;">
          Cancel
        </button>
      </div>
    </div>`;
  modal.onclick = () => modal.remove();
  document.body.appendChild(modal);
  document.getElementById('manual-save-content')?.focus();
}

async function submitManualSave() {
  const value = document.getElementById('manual-save-content')?.value.trim();
  if (!value) return;

  const btn = document.querySelector('#manual-save-modal button[onclick="submitManualSave()"]');
  if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

  try {
    const res = await fetch('/api/library', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value, source: 'manual' }),
    });
    const json = await res.json();
    if (json.success) {
      document.getElementById('manual-save-modal')?.remove();
      showToast('Saved to Library', 'success');
      const q = document.getElementById('library-search')?.value || '';
      loadLibraryEntries(q, _libraryActiveTag);
    }
  } catch {
    showToast('Failed to save', 'warning');
    if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
  }
}

function getNextMondayLabel() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  const daysUntilMonday = day === 0 ? 1 : 8 - day;
  const nextMonday = new Date(now);
  nextMonday.setDate(now.getDate() + daysUntilMonday);
  return nextMonday.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

async function enterFocusMode(actionId, outcomeId) {
  // Allow null actionId for library-driven sessions (Phase 4.0)
  const isLibrarySession = !actionId && !!window._libraryFocusContext;

  let focusAction = null;
  let parentOutcome = null;
  if (actionId) {
    // If outcomeId provided (from action row button), use it directly to avoid stale-state mismatch
    if (outcomeId) {
      parentOutcome = OUTCOMES.find(o => o.id === outcomeId) || null;
      focusAction = parentOutcome ? (parentOutcome.actions || []).find(a => a.id === actionId) : null;
    }
    // Fallback: search all outcomes
    if (!focusAction) {
      for (const outcome of OUTCOMES) {
        const found = (outcome.actions || []).find(a => a.id === actionId);
        if (found) { focusAction = found; parentOutcome = outcome; break; }
      }
    }
    if (!focusAction) return;
  } else if (!isLibrarySession) {
    return; // No actionId and no library context — nothing to do
  }

  setFocusToggleState(true);
  focusActionId  = actionId;
  focusHistory   = [];
  focusStartTime = Date.now();

  try {
    const res = await fetch('/api/focus/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ actionId: actionId || null, outcomeId: parentOutcome?.id || null }),
    });
    const data = await res.json();
    focusSessionId = data.data?.id || null;
  } catch (e) {
    focusSessionId = null;
  }

  const appWrapper = document.getElementById('app-wrapper');
  if (appWrapper) appWrapper.style.display = 'none';

  const quote = FOCUS_QUOTES[Math.floor(Math.random() * FOCUS_QUOTES.length)];

    ? focusAction.title
    : (window._libraryFocusContext ? window._libraryFocusContext.title : 'Library Session');
  const timeVal = focusAction ? (focusAction.time || focusAction.time_estimate) : null;
  const timeStr = timeVal ? `${timeVal} min` : '';
  const metaStr = [parentOutcome?.title, timeStr].filter(Boolean).join(' \xb7 ');

  const overlay = document.createElement('div');
  overlay.id = 'focus-overlay';
  overlay.style.cssText = "position:fixed;inset:0;background:#0d0d0d;z-index:9999;display:flex;flex-direction:column;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;";

  overlay.innerHTML = `
    <div style="position:absolute;top:20px;right:24px;">
      <span style="color:#374151;font-size:11px;cursor:pointer;" onclick="exitFocusMode()">[esc]</span>
    </div>
    <div style="padding:40px 40px 0;flex-shrink:0;">
      <div style="color:#4ade80;font-size:10px;letter-spacing:.1em;margin-bottom:10px;">&gt; ${isLibrarySession ? 'LIBRARY SESSION' : 'FOCUSING ON'}</div>
      <div style="color:#e5e7eb;font-size:20px;font-weight:600;line-height:1.3;">${escHtml(focusTitle)}</div>
      ${metaStr ? `<div style="color:#6b7280;font-size:12px;margin-top:6px;">${escHtml(metaStr)}</div>` : ''}
      <div style="color:#1f2937;font-size:11px;font-style:italic;margin-top:20px;max-width:480px;">${escHtml(quote)}</div>
      <div id="focus-timer" style="color:#4ade80;font-size:12px;margin-top:16px;letter-spacing:.05em;">00:00</div>
    </div>
    <div id="focus-messages" style="flex:1;overflow-y:auto;padding:24px 40px;display:flex;flex-direction:column;gap:16px;"></div>
    <div style="padding:0 40px 36px;flex-shrink:0;">

          onclick="toggleVoiceNote()"
          title="Voice note"
          style="display:none;background:transparent;border:none;cursor:pointer;color:#6b7280;padding:2px 4px;font-size:16px;line-height:1;margin-top:2px;"
        >&#127897;</button>
        <span id="focus-recording-indicator" style="display:none;font-size:10px;color:#ef4444;margin-top:6px;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;">&#9210; recording</span>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  const timerEl = document.getElementById('focus-timer');
  focusTimerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - focusStartTime) / 1000);
    const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const ss = String(elapsed % 60).padStart(2, '0');
    if (timerEl) timerEl.textContent = `${mm}:${ss}`;
  }, 1000);

  document.addEventListener('keydown', focusModeKeyHandler);
  initVoiceNote();

  // Library context injection (Phase 4.0)
  if (window._libraryFocusContext) {
    const ctx = window._libraryFocusContext;
    window._libraryFocusContext = null; // consume it

    // Show the library entry as an initial system message in the terminal
    const messages = document.getElementById('focus-messages');
    if (messages) {
      const block = document.createElement('div');
      block.style.cssText = 'padding:10px 0 16px;border-bottom:1px solid #1a1a1a;margin-bottom:12px;';
      block.innerHTML = `
        <div style="font-size:10px;color:#4b5563;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;">Library: ${escHtml(ctx.title)}</div>
        <div style="font-size:12px;color:#9ca3af;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;white-space:pre-wrap;line-height:1.6;">${escHtml(ctx.content.slice(0, 600))}${ctx.content.length > 600 ? '\n\u2026' : ''}</div>
      `;
      messages.appendChild(block);
    }

    // Pre-fill the input placeholder so user can immediately converse about the entry
    const input = document.getElementById('focus-input');
    if (input) input.placeholder = `Ask Claude about "${ctx.title}"\u2026`;

    // Store it on the session so the backend Focus route can inject it as context
    window._focusLibraryPayload = { title: ctx.title, content: ctx.content };
  }

  document.getElementById('focus-input')?.focus();
}

async function exitFocusMode() {
  if (focusHistory.length > 0) {
    if (!confirm("Leave this session? It'll be saved.")) return;
  }

  // Fade the overlay before removing
  const overlay = document.getElementById('focus-overlay');
  if (overlay) {
    overlay.style.transition = 'opacity 300ms ease-out';
    overlay.style.opacity = '0';
    await new Promise(r => setTimeout(r, 300));
  }

  clearInterval(focusTimerInterval);
  const durationSeconds = Math.floor((Date.now() - (focusStartTime || Date.now())) / 1000);

  if (focusSessionId) {
    fetch(`/api/focus/sessions/${focusSessionId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ended_at: new Date().toISOString(),
        duration_seconds: durationSeconds,
        conversation: JSON.stringify(focusHistory),
      }),
    }).catch(() => {});
  }

  document.getElementById('focus-overlay')?.remove();
  document.removeEventListener('keydown', focusModeKeyHandler);

  const appWrapper = document.getElementById('app-wrapper');
  if (appWrapper) appWrapper.style.display = '';

  setFocusToggleState(false);
  focusActionId      = null;
  focusSessionId     = null;
  focusHistory       = [];
  focusStartTime     = null;
  focusTimerInterval = null;
  // Phase 4.0 — clear library context and voice state across sessions
  window._libraryFocusContext  = null;
  window._focusLibraryPayload  = null;
  voiceRecognition = null;
  voiceRecording   = false;
}

function appendFocusMessage(role, text) {
  const container = document.getElementById('focus-messages');
  if (!container) return null;

  const wrapper = document.createElement('div');

  const el = document.createElement('div');
  if (role === 'user') {
    el.style.cssText = 'color:#4ade80;font-size:11px;line-height:1.5;';
    el.innerHTML = `<span style="margin-right:8px;">&gt;</span>${escHtml(text)}`;
  } else {
    el.style.cssText = 'color:#9ca3af;font-size:11px;line-height:1.7;white-space:pre-wrap;';
    el.textContent = text;
  }

  wrapper.appendChild(el);

  // Phase 2.5: "Save this →" chip on assistant messages
  if (role === 'assistant' && text) {
    const chip = document.createElement('div');
    chip.style.cssText = 'text-align:right;margin-top:4px;';
    const btn = document.createElement('button');
    btn.textContent = 'Save this →';
    btn.setAttribute('data-content', text);
    btn.style.cssText = "font-size:10px;color:#9ca3af;background:transparent;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;border:1px solid #2a2a2a;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;";
    btn.onclick = () => saveContextFromFocusBlock(btn);
    chip.appendChild(btn);
    wrapper.appendChild(chip);
  }

  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
  return el;
}

async function sendFocusMessage() {
  const input = document.getElementById('focus-input');
  const userMessage = input?.value.trim();
  if (!userMessage) return;

  input.value = '';

  appendFocusMessage('user', userMessage);
  const assistantEl = appendFocusMessage('assistant', '');

  const historySnapshot = [...focusHistory];

  try {
    const response = await fetch('/api/focus/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        actionId: focusActionId,
        message: userMessage,
        history: historySnapshot,
      }),
    });

    if (!response.ok) throw new Error(`API error ${response.status}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullResponse = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      fullResponse += chunk;
      if (assistantEl) {
        assistantEl.textContent = fullResponse;
        const messages = document.getElementById('focus-messages');
        if (messages) messages.scrollTop = messages.scrollHeight;
      }
    }

    // Update the save chip data-content with full response
    if (assistantEl && assistantEl.nextElementSibling) {
      const chipBtn = assistantEl.nextElementSibling.querySelector('button[data-content]');
      if (chipBtn) chipBtn.setAttribute('data-content', fullResponse);
    }

    focusHistory.push({ role: 'user', content: userMessage });
    focusHistory.push({ role: 'assistant', content: fullResponse });

    extractAndSaveContext(userMessage);

  } catch (err) {
    if (assistantEl) {
      assistantEl.textContent = '[Error: Could not reach Claude. Try again.]';
      assistantEl.style.color = '#ef4444';
    }
  }
}

function appendFocusSysMessage(text) {
  const container = document.getElementById('focus-messages');
  if (!container) return;
  const el = document.createElement('div');
  el.style.cssText = "font-size:11px;color:#6b7280;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;padding:2px 0;display:flex;align-items:baseline;gap:6px;";
  el.innerHTML = '<span style="color:#4ade80;font-size:10px;">✦</span>' + text;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

async function extractAndSaveContext(userMessage) {
  try {
    const res = await fetch('/api/focus/extract-context', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userMessage, actionId: focusActionId }),
    });
    const data = await res.json();
    if (data.success && data.updates?.length > 0) {
      for (const u of data.updates) {
        appendFocusSysMessage(`Memory updated · ${u.key}`);
      }
    }
  } catch (_) {}
}

function focusInputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendFocusMessage();
  }
}

let voiceRecognition = null;
let voiceRecording   = false;

function initVoiceNote() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return; // Graceful degradation — hide button, do nothing

  const micBtn = document.getElementById('focus-mic-btn');
  if (micBtn) micBtn.style.display = '';

  voiceRecognition = new SpeechRecognition();
  voiceRecognition.continuous     = false;
  voiceRecognition.interimResults = false;
  voiceRecognition.lang           = 'en-US';

  voiceRecognition.onresult = async (event) => {
    const transcript = event.results[0][0].transcript.trim();
    stopVoiceRecording();
    if (!transcript) return;

    // Append transcript as a user message in the terminal
    appendFocusMessage('user', '[voice note]: ' + transcript);

    // Check if it sounds task-like — ask Claude with a minimal prompt
    const taskCheck = await checkVoiceNoteIsTask(transcript);

    // Set transcript in input and send through existing Focus Mode path
    const input = document.getElementById('focus-input');
    if (input) { input.value = transcript; }
    await sendFocusMessage();

    // Show "Add to inbox?" chip if task-like
    if (taskCheck) {
      showVoiceInboxChip(transcript);
    }
  };

  voiceRecognition.onerror = (event) => {
    console.warn('[Voice] Recognition error:', event.error);
    stopVoiceRecording();
  };

  voiceRecognition.onend = () => {
    stopVoiceRecording();
  };
}

function toggleVoiceNote() {
  if (voiceRecording) {
    if (voiceRecognition) voiceRecognition.stop();
    stopVoiceRecording();
  } else {
    startVoiceRecording();
  }
}

function startVoiceRecording() {
  if (!voiceRecognition) return;
  voiceRecording = true;
  const micBtn = document.getElementById('focus-mic-btn');
  const indicator = document.getElementById('focus-recording-indicator');
  if (micBtn) micBtn.style.color = '#ef4444';
  if (indicator) indicator.style.display = '';
  voiceRecognition.start();
}

function stopVoiceRecording() {
  voiceRecording = false;
  const micBtn = document.getElementById('focus-mic-btn');
  const indicator = document.getElementById('focus-recording-indicator');
  if (micBtn) micBtn.style.color = '#6b7280';
  if (indicator) indicator.style.display = 'none';
}

async function checkVoiceNoteIsTask(transcript) {
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Does this sound like a task or commitment that should be tracked? Reply with only the single word "task" or "not".\n\n"' + transcript + '"',
        history: [],
      }),
    });
    const data = await res.json();
    const reply = (data.reply || data.response || '').toLowerCase().trim();
    return reply.startsWith('task');
  } catch {
    return false;
  }
}

function showVoiceInboxChip(transcript) {
  const container = document.getElementById('focus-messages');
  if (!container) return;

  const chip = document.createElement('div');
  chip.style.cssText = "display:flex;align-items:center;gap:8px;padding:8px 12px;background:#111827;border:1px solid #22c55e;border-radius:8px;margin-top:4px;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;font-size:11px;color:#9ca3af;";
  chip.innerHTML = `
    <span style="color:#4ade80;">?</span>
    <span>Add to inbox?</span>
    <button onclick="addVoiceNoteToInbox(this, ${JSON.stringify(transcript)})"
      style="margin-left:auto;background:#22c55e;color:#000;border:none;border-radius:4px;padding:2px 10px;font-size:10px;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;cursor:pointer;font-weight:600;">
      Yes
    </button>
    <button onclick="this.closest('div').remove()"
      style="background:transparent;color:#4b5563;border:none;font-size:10px;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;cursor:pointer;">
      No
    </button>`;
  container.appendChild(chip);
  container.scrollTop = container.scrollHeight;
}

async function addVoiceNoteToInbox(btn, transcript) {
  btn.closest('div').remove();
  try {
    await fetch('/api/inbox', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: transcript.length > 120 ? transcript.slice(0, 117) + '\u2026' : transcript,
        source_type: 'manual',
        source_metadata: { origin: 'voice_note', action_id: focusActionId },
      }),
    });
    // Show confirmation inline
    const container = document.getElementById('focus-messages');
    if (container) {
      const confirm = document.createElement('div');
      confirm.style.cssText = "font-size:11px;color:#4ade80;font-family:'SF Mono','SFMono-Regular',Menlo,monospace;padding:4px 0;";
      confirm.textContent = '\u2713 Added to inbox';
      container.appendChild(confirm);
      container.scrollTop = container.scrollHeight;
    }
  } catch {
    // Fail silently — not a critical feature
  }
}

let memoryPanelOpen = false;

async function toggleMemoryPanel() {
  memoryPanelOpen = !memoryPanelOpen;
  const panel = document.getElementById('memory-panel');
  if (panel) panel.style.display = memoryPanelOpen ? 'block' : 'none';
  if (memoryPanelOpen) await loadMemoryPanel();
}

async function loadMemoryPanel() {
  try {
    const res = await fetch('/api/context');
    const data = await res.json();
    const entries = data.data || [];

    const countEl = document.getElementById('memory-count');
    if (countEl) countEl.textContent = entries.length;

    renderMemoryList(entries);
  } catch (e) {
    console.warn('Failed to load memory:', e);
  }
}

function renderMemoryList(entries) {
  const list = document.getElementById('memory-list');
  if (!list) return;

  const taskEntries = entries.filter(e => e.category !== 'saved_output');
  const savedOutputs = entries.filter(e => e.category === 'saved_output');

  if (taskEntries.length === 0 && savedOutputs.length === 0) {
    list.innerHTML = `<div style="font-size:10px;color:#d1d5db;padding:4px 0;">No memories yet. They'll be collected as you work.</div>`;
    return;
  }

  let html = taskEntries.map(entry => `
    <div style="display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid #f9fafb;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:10px;font-weight:500;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(entry.key)}</div>
        <div
          contenteditable="true"
          onblur="saveContextEdit(${entry.id}, this.textContent, '${escHtml(entry.category || '')}')"
          style="font-size:10px;color:#6b7280;outline:none;cursor:text;"
        >${escHtml(entry.value)}</div>
      </div>
      <button
        onclick="deleteContextEntry(${entry.id})"
        style="flex-shrink:0;background:transparent;border:none;color:#d1d5db;font-size:12px;cursor:pointer;padding:0 2px;line-height:1;"
        title="Delete">×</button>
    </div>
  `).join('');

  if (savedOutputs.length > 0) {
    html += `<div style="font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-top:10px;margin-bottom:4px;">Saved Outputs</div>`;
    html += savedOutputs.map(entry => `
      <div style="padding:6px 0;border-bottom:1px solid #f9fafb;">
        <div style="font-size:10px;font-weight:500;color:#374151;margin-bottom:2px;">${escHtml(entry.key)}</div>
        <div style="font-size:10px;color:#6b7280;white-space:pre-wrap;max-height:50px;overflow:hidden;">${escHtml((entry.value || '').slice(0, 120))}</div>
        <div style="font-size:9px;color:#9ca3af;margin-top:2px;">${new Date(entry.created_at).toLocaleDateString()}</div>
      </div>
    `).join('');
  }

  list.innerHTML = html;
}

async function saveContextEdit(id, newValue, category) {
  const value = (newValue || '').trim();
  if (!value) return;
  try {
    await fetch(`/api/context/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value, category }),
    });
  } catch (e) {
    console.warn('Failed to save context edit:', e);
  }
}

async function deleteContextEntry(id) {
  if (!confirm('Remove this memory?')) return;
  try {
    await fetch(`/api/context/${id}`, { method: 'DELETE' });
    await loadMemoryPanel();
  } catch (e) {
    console.warn('Failed to delete context entry:', e);
  }
}

function showAddContextForm() {
  const list = document.getElementById('memory-list');
  if (!list) return;
  const form = document.createElement('div');
  form.style.cssText = 'display:flex;flex-direction:column;gap:4px;padding:6px 0;border-bottom:1px solid #f3f4f6;margin-bottom:4px;';

    </div>`;

async function submitAddContext() {
  const key   = document.getElementById('new-ctx-key')?.value.trim();
  const value = document.getElementById('new-ctx-val')?.value.trim();
  if (!key || !value) return;
  try {
    await fetch('/api/context', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value, category: 'task_duration', source: 'manual' }),
    });
    await loadMemoryPanel();
  } catch (e) {
    console.warn('Failed to add context:', e);
  }
}

async function saveContextFromFocus(userMessage, assistantResponse, chipEl) {
  const key = userMessage.slice(0, 60).trim();
  const match = assistantResponse.match(/(\d+[\s\-–]*(?:min(?:utes?)?|hours?|hrs?)[^.!?\n]*)/i);
  const value = match ? match[1].trim() : assistantResponse.slice(0, 80).trim();

  chipEl.disabled = true;
  chipEl.textContent = 'Saving…';

  try {
    const res = await fetch('/api/context', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        key, value, category: 'task_duration', source: 'focus_mode',
        source_action_id: focusActionId,
      }),
    });
    if (res.ok) {
      chipEl.textContent = 'Saved ✓';
      chipEl.style.color = '#6b7280';
      setTimeout(() => chipEl.remove(), 2000);
    } else {
      chipEl.textContent = 'Save failed';
      chipEl.disabled = false;
    }
  } catch (e) {
    chipEl.textContent = 'Save failed';
    chipEl.disabled = false;
  }
}

// Phase 2.5: save full assistant block to Library
async function saveContextFromFocusBlock(btn) {
  const content = btn.getAttribute('data-content') || '';
  if (!content) return;
  const key = content.trim().split(/\s+/).slice(0, 8).join(' ');
  try {
    const res = await fetch('/api/library', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: content, source: 'focus_mode' }),
    });
    if (res.ok) {
      btn.textContent = 'Saved ✓';
      btn.disabled = true;
      btn.style.color = '#4ade80';
    }
  } catch (_) {
    btn.textContent = 'Failed';
  }
}

async function submitBreakdownQuestions() {
  const questions = window._pendingBreakdownQuestions || [];

  await Promise.all(saves).catch(() => {});

  const pendingActions = window._pendingBreakdownActions || [];
  window._pendingBreakdownQuestions = null;
  window._pendingBreakdownActions   = null;
  window._pendingBreakdownOutcomeId = null;

  renderCmdBreak(pendingActions);
}
